                            {barLayout.map((m) => {
                                const isOpu = type === 'opu';
                                const isFet = type === 'fet';
                                const isFetGroupBar = type === 'fet' && ['fet-m3', 'fet-m4', 'fet-m5'].includes(m.id);

                                // Auto-wrap text to fit within bar width
                                const wrapText = (text, maxCharsPerLine) => {
                                    if (!text) return [];
                                    const words = text.split(' ');
                                    const lines = [];
                                    let currentLine = '';
                                    words.forEach(word => {
                                        if (currentLine.length + word.length + 1 <= maxCharsPerLine) {
                                            currentLine = currentLine ? currentLine + ' ' + word : word;
                                        } else {
                                            if (currentLine) lines.push(currentLine);
                                            currentLine = word;
                                        }
                                    });
                                    if (currentLine) lines.push(currentLine);
                                    return lines;
                                };

                                // Estimate max chars per line based on bar width and font size
                                const estimateMaxChars = (width, fontSize) => Math.max(5, Math.floor((width - 10) / (fontSize * 0.5)));

                                // Split the label into header and remaining lines
                                let headerLines = [];
                                let restLines = [];
                                if (m.label.includes('\n\n')) {
                                    const parts = m.label.split('\n\n');
                                    headerLines = parts[0].split('\n');
                                    restLines = parts.slice(1).join('\n\n').split('\n');
                                } else {
                                    const lines = m.label.split('\n');
                                    headerLines = [lines[0]];
                                    restLines = lines.slice(1);
                                }
                                const firstLine = headerLines[0];

                                // --- DEFAULT FONT LOGIC ---
                                // Dynamically calculate font sizes based on the bar width.
                                // We use a factor to estimate character width relative to font size.
                                // More aggressive 0.5 factor to fit larger text
                                let charWidthFactor = 0.5;

                                // Allow larger maximums to let text fill wider bars (like in IUI)
                                let maxNameFont = isFet ? 20 : 36;
                                let maxDescFont = isFet ? 16 : 26;

                                let nameFontSize = 14;
                                let descFontSize = 12;

                                // --- OPU SPECIFIC LOGIC ---
                                if (isOpu) {
                                    if (m.isTrigger) {
                                        // Trigger Bar
                                        let availableWidth = m.w - 160;

                                        // Fixed name size as requested
                                        nameFontSize = 24;

                                        // Trigger description usually not present or just name, but keep logic safe
                                        descFontSize = 14;
                                    } else {
                                        // NON-TRIGGER
                                        // 1. Name fixed to 20.
                                        nameFontSize = 20;

                                        // 2. Instructions fixed to 16.
                                        descFontSize = 16;
                                    }
                                } else {
                                    // --- EXISTING LOGIC FOR FET/ORA/IUI ---
                                    // Calculate name font size to fit width, constrained by max
                                    nameFontSize = Math.min(
                                        maxNameFont,
                                        Math.floor((m.w - 10) / (firstLine.length * charWidthFactor))
                                    );

                                    // Explicitly set FET name font size to 20 as requested previously
                                    if (isFet) nameFontSize = 20;

                                    // Ensure a minimum readable size
                                    nameFontSize = Math.max(nameFontSize, 12);

                                    // Description font size relative to name
                                    descFontSize = Math.min(maxDescFont, nameFontSize - 2);
                                    descFontSize = Math.max(descFontSize, 10);
                                }

                                // Apply auto-wrap to header and rest lines based on bar width
                                const headerMaxChars = estimateMaxChars(m.w, nameFontSize);
                                const descMaxChars = estimateMaxChars(m.w, descFontSize);
                                headerLines = headerLines.flatMap(line => wrapText(line, headerMaxChars));
                                restLines = restLines.flatMap(line => wrapText(line, descMaxChars));

                                // Line height
                                let lineHeight = descFontSize + 4;

                                // Check height constraint
                                // We SKIP height constraint for OPU Non-Trigger bars to enforce the requested sizes.
                                const shouldCheckHeight = !(isOpu && !m.isTrigger);

                                if (shouldCheckHeight) {
                                    const totalLines = headerLines.length + restLines.length;
                                    let textHeight = (headerLines.length * nameFontSize) + restLines.length * lineHeight;

                                    // If text exceeds height, scale down
                                    if (textHeight > m.h - 10) {
                                        const availablePerLine = (m.h - 10) / totalLines;
                                        nameFontSize = Math.min(nameFontSize, availablePerLine);
                                        descFontSize = Math.min(descFontSize, availablePerLine * 0.8);
                                        lineHeight = descFontSize + 4;
                                    }
                                }

                                // Date label font size:
                                // For FET, force to 20 to match bracket date. Otherwise scale.
                                let dateFontSize = isFet ? 20 : Math.min(22, Math.max(14, m.w / 12));

                                // OPU Specific Date Font Size Logic
                                if (isOpu && !m.isTrigger) {
                                    // "increase the font size of the date over the bar to fit the width of the bar"
                                    // Try to fill ~80% of width
                                    dateFontSize = Math.min(32, Math.max(16, (m.w * 0.8) / (m.dateLabel.length * 0.55)));
                                }

                                // Center X Calculation
                                // For OPU Trigger, center text in the remaining space on the left
                                let textCenterX = m.x + m.w / 2;
                                let textAnchor = "middle";
                                if (isOpu && m.isTrigger) {
                                    // Align text to left
                                    textCenterX = m.x + 15;
                                    textAnchor = "start";
                                }

                                // Header Box Height Calculation
                                let headerBoxHeight = m.isTrigger ? 0 : Math.max(30, (headerLines.length * nameFontSize) + 16);

                                return (
                                    <g key={m.id}>
                                        {/* Date label above bar (except for trigger bars and grouped FET bars) */}
                                        {!m.isTrigger && !isFetGroupBar && (
                                            <text
                                                x={m.x + m.w / 2}
                                                y={m.y - 8}
                                                textAnchor="middle"
                                                className="fill-gray-700 font-bold"
                                                fontSize={dateFontSize}
                                                style={{ fontFamily: "'Anuphan', sans-serif" }}
                                            >
                                                {m.dateLabel}
                                            </text>
                                        )}

                                        {/* Background rect for the whole body */}
                                        <rect x={m.x} y={m.y} width={m.w} height={m.h} fill={m.bg || "#ffffff"} stroke="none" />

                                        {/* Colored header rect */}
                                        {!m.isTrigger && (
                                            <rect x={m.x} y={m.y} width={m.w} height={headerBoxHeight} fill={m.stroke} />
                                        )}

                                        {/* Border overlay for cleaner outline */}
                                        <rect x={m.x} y={m.y} width={m.w} height={m.h} fill="none" stroke={m.stroke} strokeWidth="3" />

                                        {/* Trigger Bar Input Box (OPU Only) */}
                                        {isOpu && m.isTrigger && (
                                            <g>
                                                <rect
                                                    x={m.x + m.w - 210}
                                                    y={m.y + 10}
                                                    width="200"
                                                    height="60"
                                                    fill="white"
                                                    rx="4" ry="4"
                                                    stroke={m.stroke}
                                                    strokeWidth="1"
                                                />
                                                <text x={m.x + m.w - 205} y={m.y + 35} fontSize="20" className="fill-gray-500 font-medium" style={{ fontFamily: "'Anuphan', sans-serif" }}>Date: ...........</text>
                                                <text x={m.x + m.w - 205} y={m.y + 60} fontSize="20" className="fill-gray-500 font-medium" style={{ fontFamily: "'Anuphan', sans-serif" }}>Time: ...........</text>
                                            </g>
                                        )}

                                        {/* Name / Header Box Text */}
                                        <text
                                            x={textCenterX}
                                            y={m.isTrigger ? (m.y + 48) : (m.y + nameFontSize + 8)}
                                            fill={m.isTrigger ? m.tx : "#ffffff"}
                                            textAnchor={textAnchor}
                                            style={{ fontFamily: "'Anuphan', sans-serif" }}
                                        >
                                            {headerLines.map((line, i) => (
                                                <tspan
                                                    key={`h-${i}`}
                                                    x={textCenterX}
                                                    dy={i === 0 ? "0" : (nameFontSize + 4)}
                                                    fontWeight="bold"
                                                    fontSize={nameFontSize}
                                                >
                                                    {line}
                                                </tspan>
                                            ))}
                                        </text>

                                        {/* Instructions / Body Text */}
                                        {restLines.length > 0 && (
                                            <text
                                                x={textCenterX}
                                                y={m.isTrigger ? (m.y + 48 + lineHeight) : (m.y + headerBoxHeight + descFontSize + 6)}
                                                fill={m.tx}
                                                textAnchor={textAnchor}
                                                style={{ fontFamily: "'Anuphan', sans-serif" }}

                                                        fontSize={descFontSize}
                                                    >
                                                        {line}
                                                    </tspan>
                                                ))}
                                            </text>
                                        )}
                                    </g>
                                );
                            })}
                        </svg>
                    </div>

                    {
                        type === 'opu' && (
                            <div className="px-8 mb-2 shrink-0 flex flex-col justify-end" style={{ height: `${tableHeight}px` }}>
                                <h3

        // CALENDAR PAGE (Print Page 1 - Patient Copy)
        // ==========================================
        function CalendarPage({ type, patientData, inputs, applied, t, language, lmpDate, edits }) {

                                                    </td>
                                                </tr>
                                            );
                                        })}

                        {visitsWithOrders.map(v => {

                                            {v.label} — {t.day} {v.day}
                                        </span>
                                        <span style={{ fontSize: '10px', color: '#4b5563' }}>
                                            {dow} {formatDate(dt)}
                                        </span>
                                    </div>

                                    {/* Rx content */}
                                    <div style={{ padding: cardPadding + ' 10px' }}>
                                        {/* Visit details */}
                                        {v.details && v.details.length > 0 && (

                                    {/* Signature line */}

                                        fontSize: '9px',
                                        color: '#6b7280',

                                        <span>{t.nurseSignature || 'Nurse'}: ________________________</span>
                                    </div>
                                    <div style={{
                                        padding: '0px 10px ' + (visitCount <= 4 ? '8px' : '4px'),
                                        fontSize: '10px',
                                        color: '#374151',
                                        fontWeight: 'bold',
                                    }}>
                                        Next Appointment: _________________________________________________
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }


        function buildTimelineBase(type, patientData, inputs, t, language) {
            if (type === 'opu') {
                const lmpDate = patientData.lmp ? new Date(patientData.lmp) : new Date();
                lmpDate.setHours(12, 0, 0, 0);

                const defaultTriggerDay = 12;
                const defaultTriggerDate = toISODate(addDays(lmpDate, defaultTriggerDay - 1));
                const defaultTriggerTime = '20:00';
                
                const defaultOpuDay = 14;
                const defaultOpuDate = toISODate(addDays(lmpDate, defaultOpuDay - 1));
                const defaultOpuTime = '08:00';
                
                const triggerDateStr = inputs.triggerStartDate || defaultTriggerDate;
                const triggerTimeStr = inputs.triggerStartTime || defaultTriggerTime;
                const opuDateStr = inputs.opuDate || defaultOpuDate;
                const opuTimeStr = inputs.opuTime || defaultOpuTime;

                const triggerDateTime = new Date(`${triggerDateStr}T${triggerTimeStr}`);
                const opuDateTime = new Date(`${opuDateStr}T${opuTimeStr}`);

                const triggerDiffMs = triggerDateTime.getTime() - lmpDate.getTime();
                let triggerDay = Math.round(triggerDiffMs / (24 * 3600000)) + 1;

                const opuDiffMs = opuDateTime.getTime() - lmpDate.getTime();
                let opuDay = Math.round(opuDiffMs / (24 * 3600000)) + 1;

                triggerDay = Math.max(1, triggerDay);
                opuDay = Math.max(1, opuDay);

                const day1Ref = inputs.day1Reference || 'menses';
                const day1Label = day1Ref === 'opu'
                    ? (language === 'th' ? 'OPU / วันตกไข่' : 'OPU / Ovulation Day')
                    : t.menses;
                const visits = [
                    { id: 'opu-v1', day: 1, label: day1Label, details: [] },
                    { id: 'opu-v2', day: 3, label: `${t.visit} 1`, details: [t.tvs, t.bloodTest, t.hormoneInjection, t.treatmentPlan] },
                    { id: 'opu-v3', day: 9, label: `${t.visit} 2`, details: [t.tvs, t.continueHormoneInjection] },
                    { id: 'opu-v4', day: triggerDay, label: `${t.visit} 3`, details: [t.tvs, t.scheduleTriggerShotOnly, t.scheduleOPUDate] },
                    { id: 'opu-v5', day: opuDay, label: `${t.visit} 4 ${t.lab}`, details: [t.eggCollection, t.semenCollection, t.icsi] },
                ];
                const medicationBars = [];
                const gMed = inputs.gonadotropinMedication || '';
                const gDose = (inputs.gonadotropinDose || '').toString().trim();

                let sc = '';
                if (gMed && gMed !== 'Elonva') {
                    sc = language === 'th'
                        ? '\nฉีดใต้ผิวหนัง\nDAILY เวลาเดิมทุกวัน'
                        : '\nSubcutaneous injection\nDAILY Fixed time';
                }

                if (gMed) {
                    // Determine unit based on medication name
                    const unit = (gMed === 'Elonva' || gMed === 'Rekovelle') ? 'mcg' : 'IU';
                    const gStart = inputs.gonadotropinStartDay ? parseInt(inputs.gonadotropinStartDay) : 3;

                    // Elonva lasts 7 days. Others go until trigger/OPU decision
                    const endDay = gMed === 'Elonva' ? gStart + 6 : triggerDay;

                    medicationBars.push({
                        id: 'opu-m-gnd',
                        shortName: 'Gonadotropins',
                        startDay: gStart,
                        endDay: endDay,
                        label: `${gMed}\n${gDose} ${unit}${sc}`.trim(),
                        color: '#d1fae5',
                        textColor: '#065f46',
                    });
                }
                if (gMed === 'Elonva' && inputs.postElonvaGonadotropinMedication) {
                    const pMed = inputs.postElonvaGonadotropinMedication;
                    const pDose = inputs.postElonvaDose || '';

                    // Determine unit for post-Elonva medication
                    const pUnit = (pMed === 'Elonva' || pMed === 'Rekovelle') ? 'mcg' : 'IU';

                    let pSc = language === 'th'
                        ? '\nฉีดใต้ผิวหนัง\nDAILY เวลาเดิมทุกวัน'
                        : '\nSubcutaneous injection\nDAILY Fixed time';

                    medicationBars.push({
                        id: 'opu-m-post-elonva',
                        shortName: 'Post-Elonva',
                        startDay: 8,
                        endDay: triggerDay,
                        label: `${pMed}\n${pDose} ${pUnit}${pSc}`.trim(),
                        color: '#d1fae5',
                        textColor: '#065f46',
                    });
                }
                if (inputs.protocol === 'Antagonist' && inputs.antagonistMedication) {
                    const s =
                        inputs.antagonistStartDayType === 'stimulationDay'
                            ? 3 + parseInt(inputs.antagonistStartDay) - 1
                            : parseInt(inputs.antagonistStartDay);

                    let antLabel = inputs.antagonistMedication;
                    if (inputs.antagonistMedication.includes('Orgalutran')) {
                        antLabel = language === 'th'
                            ? "Orgalutran\n0.25 mg\n1 เข็ม ฉีดใต้ผิวหนัง\nวันละ 1 ครั้ง เวลาเดิมทุกวัน"
                            : "Orgalutran\n0.25 mg\n1 syringe Subcutaneous injection\nOnce daily Fixed time";
                    } else if (inputs.antagonistMedication.includes('Cetrotide')) {
                        antLabel = language === 'th'
                            ? "Cetrotide\n0.25 mg\n1 เข็ม ฉีดใต้ผิวหนัง\nวันละ 1 ครั้ง เวลาเดิมทุกวัน"
                            : "Cetrotide\n0.25 mg\n1 syringe Subcutaneous injection\nOnce daily Fixed time";
                    }

                    medicationBars.push({
                        id: 'opu-m-ant',
                        shortName: 'Antagonist',
                        startDay: s,
                        endDay: triggerDay,
                        label: antLabel,
                        color: '#fee2e2',
                        textColor: '#991b1b',
                    });
                }
                if (inputs.protocol === 'PPOS' && inputs.progestinMedication) {
                    const s =
                        inputs.progestinStartDayType === 'stimulationDay'
                            ? 3 + parseInt(inputs.progestinStartDay) - 1
                            : parseInt(inputs.progestinStartDay);

                    let pposLabel = inputs.progestinMedication;
                    // Mapping for PPOS detailed instructions
                    if (inputs.progestinMedication.includes('Cerazette')) {
                        pposLabel = language === 'th'
                            ? "Cerazette\n1 เม็ด รับประทาน\nวันละ 1 ครั้ง ก่อนนอน"
                            : "Cerazette\n1 tab Oral\nOnce daily Bedtime";
                    } else if (inputs.progestinMedication.includes('Provera 5')) {
                        pposLabel = language === 'th'
                            ? "Provera\n5 mg\n1 เม็ด รับประทาน\nวันละ 1 ครั้ง ก่อนนอน"
                            : "Provera\n5 mg\n1 tab Oral\nOnce daily Bedtime";
                    } else if (inputs.progestinMedication.includes('Provera 10')) {
                        pposLabel = language === 'th'
                            ? "Provera\n10 mg\n1 เม็ด รับประทาน\nวันละ 1 ครั้ง ก่อนนอน"
                            : "Provera\n10 mg\n1 tab Oral\nOnce daily Bedtime";
                    } else if (inputs.progestinMedication.includes('Dienogest')) {
                        pposLabel = language === 'th'
                            ? "Dienogest\n2 mg\n1 เม็ด รับประทาน\nวันละ 1 ครั้ง ก่อนนอน"
                            : "Dienogest\n2 mg\n1 tab Oral\nOnce daily Bedtime";
                    } else if (inputs.progestinMedication.includes('Dydrogesterone')) {
                        pposLabel = language === 'th'
                            ? "Dydrogesterone\n10 mg\n1 เม็ด รับประทาน\nวันละ 2 ครั้ง เช้า - เย็น"
                            : "Dydrogesterone\n10 mg\n1 tab Oral\nTwice daily Morning & Evening";
                    }

                    medicationBars.push({
                        id: 'opu-m-ppos',
                        shortName: 'Progestin',
                        startDay: s,
                        endDay: triggerDay,
                        label: pposLabel,
                        color: '#ccfbf1',
                        textColor: '#115e59',
                    });
                }
                if (inputs.protocol === 'Luteal stimulation') {
                    // Luteal phase stim: Day 1 = OPU/ovulation day (not menses)
                    // All days are relative to OPU day as day 1
                    const stimStartOffset = parseInt(inputs.lutealStimStartDay) || 2;

                    // Override visits — day 1 is OPU/ovulation reference
                    visits.length = 0;
                    visits.push(
                        { id: 'opu-v1', day: 1, label: language === 'th' ? 'OPU / วันตกไข่' : 'OPU / Ovulation Day', details: [language === 'th' ? 'จุดเริ่มต้น Luteal Phase' : 'Luteal Phase Reference'] },
                        { id: 'opu-v2', day: stimStartOffset, label: `${t.visit} 1`, details: [t.tvs, t.bloodTest, t.hormoneInjection] },
                        { id: 'opu-v3', day: stimStartOffset + 6, label: `${t.visit} 2`, details: [t.tvs, t.continueHormoneInjection] },
                        { id: 'opu-v4', day: triggerDay, label: `${t.visit} 3`, details: [t.tvs, t.scheduleOPUDate] },
                        { id: 'opu-v5', day: opuDay, label: `${t.visit} 4 ${t.lab}`, details: [t.eggCollection, t.semenCollection, t.icsi] },
                    );

                    // Clear medication bars for recalculation
                    medicationBars.length = 0;

                    // Gonadotropins for luteal stimulation
                    if (gMed) {
                        const unit = (gMed === 'Elonva' || gMed === 'Rekovelle') ? 'mcg' : 'IU';
                        let lutealGndSc = '';
                        if (gMed && gMed !== 'Elonva') {
                            lutealGndSc = language === 'th'
                                ? '\nฉีดใต้ผิวหนัง\nDAILY เวลาเดิมทุกวัน'
                                : '\nSubcutaneous injection\nDAILY Fixed time';
                        }
                        medicationBars.push({
                            id: 'opu-m-lut-gnd',
                            shortName: 'Gonadotropins',
                            startDay: stimStartOffset,
                            endDay: triggerDay,
                            label: `${gMed}\n${gDose} ${unit}${lutealGndSc}`.trim(),
                            color: '#d1fae5',
                            textColor: '#065f46',
                        });
                    }

                    // LH Surge Prevention: Antagonist or Progestin
                    const lutealStrategy = inputs.lutealLhStrategy || 'antagonist';
                    if (lutealStrategy === 'antagonist' && inputs.antagonistMedication) {
                        let antLabel = inputs.antagonistMedication;
                        if (inputs.antagonistMedication.includes('Orgalutran')) {
                            antLabel = language === 'th'
                                ? "Orgalutran\n0.25 mg\n1 เข็ม ฉีดใต้ผิวหนัง\nวันละ 1 ครั้ง เวลาเดิมทุกวัน"
                                : "Orgalutran\n0.25 mg\n1 syringe Subcutaneous injection\nOnce daily Fixed time";
                        } else if (inputs.antagonistMedication.includes('Cetrotide')) {
                            antLabel = language === 'th'
                                ? "Cetrotide\n0.25 mg\n1 เข็ม ฉีดใต้ผิวหนัง\nวันละ 1 ครั้ง เวลาเดิมทุกวัน"
                                : "Cetrotide\n0.25 mg\n1 syringe Subcutaneous injection\nOnce daily Fixed time";
                        }
                        medicationBars.push({
                            id: 'opu-m-lut-ant',
                            shortName: 'Antagonist',
                            startDay: stimStartOffset + 4,
                            endDay: triggerDay,
                            label: antLabel,
                            color: '#fee2e2',
                            textColor: '#991b1b',
                        });
                    } else if (lutealStrategy === 'progestin' && inputs.lutealProgestinMedication) {
                        // Use same label mapping as PPOS
                        let lutProgestinLabel = inputs.lutealProgestinMedication;
                        if (inputs.lutealProgestinMedication.includes('Cerazette')) {
                            lutProgestinLabel = language === 'th'
                                ? "Cerazette\n1 เม็ด รับประทาน\nวันละ 1 ครั้ง ก่อนนอน"
                                : "Cerazette\n1 tab Oral\nOnce daily Bedtime";
                        } else if (inputs.lutealProgestinMedication.includes('Provera 5')) {
                            lutProgestinLabel = language === 'th'
                                ? "Provera\n5 mg\n1 เม็ด รับประทาน\nวันละ 1 ครั้ง ก่อนนอน"
                                : "Provera\n5 mg\n1 tab Oral\nOnce daily Bedtime";
                        } else if (inputs.lutealProgestinMedication.includes('Provera 10')) {
                            lutProgestinLabel = language === 'th'
                                ? "Provera\n10 mg\n1 เม็ด รับประทาน\nวันละ 1 ครั้ง ก่อนนอน"
                                : "Provera\n10 mg\n1 tab Oral\nOnce daily Bedtime";
                        } else if (inputs.lutealProgestinMedication.includes('Dienogest')) {
                            lutProgestinLabel = language === 'th'
                                ? "Dienogest\n2 mg\n1 เม็ด รับประทาน\nวันละ 1 ครั้ง ก่อนนอน"
                                : "Dienogest\n2 mg\n1 tab Oral\nOnce daily Bedtime";
                        } else if (inputs.lutealProgestinMedication.includes('Dydrogesterone')) {
                            lutProgestinLabel = language === 'th'
                                ? "Dydrogesterone\n10 mg\n1 เม็ด รับประทาน\nวันละ 2 ครั้ง เช้า - เย็น"
                                : "Dydrogesterone\n10 mg\n1 tab Oral\nTwice daily Morning & Evening";
                        }
                        medicationBars.push({
                            id: 'opu-m-lut-progestin',
                            shortName: 'Progestin',
                            startDay: stimStartOffset,
                            endDay: triggerDay,
                            label: lutProgestinLabel,
                            color: '#ccfbf1',
                            textColor: '#115e59',
                        });
                    }

                    if (inputs.triggerMedication) {
                        const v3 = visits.find((v) => v.id === 'opu-v4');
                        if (v3) {
                            v3.details.push(`Trigger: ${inputs.triggerMedication} (${formatDateTime(triggerDateTime)})`);
                        }
                        medicationBars.push({
                            id: 'opu-m-lut-trigger',
                            shortName: 'Trigger',
                            startDay: triggerDay,
                            endDay: triggerDay,
                            label: `${inputs.triggerMedication}\n${t.triggerTime || 'Trigger Time'}: ${formatDateTime(triggerDateTime)}`,
                            color: '#009473',
                            textColor: '#ffffff',
                        });
                    }
                }
                if (inputs.triggerMedication && inputs.protocol !== 'Luteal stimulation') {
                    const v3 = visits.find((v) => v.id === 'opu-v4');
                    if (v3) {
                        v3.details = v3.details.filter((d) => d !== t.scheduleTriggerShotOnly);
                        v3.details.push(`Trigger: ${inputs.triggerMedication} (${formatDateTime(triggerDateTime)})`);
                    }
                    medicationBars.push({
                        id: 'opu-m-trigger',
                        shortName: 'Trigger',
                        startDay: triggerDay,
                        endDay: triggerDay,
                        label: `${inputs.triggerMedication}\n${t.triggerTime || 'Trigger Time'}: ${formatDateTime(triggerDateTime)}`,
                        color: '#009473',
                        textColor: '#ffffff',
                    });
                }

                // Add OPU date & time details to visit 4 (OPU Visit)
                const v4 = visits.find((v) => v.id === 'opu-v5');
                if (v4) {
                    v4.details[0] = `${t.eggCollection} (${formatDateTime(opuDateTime)})`;
                }

                let phase2 = null;
                if (inputs.protocol === 'DuoStim') {
                    // Phase 2 uses relative days: Day 1 = Phase 1 OPU day
                    const p2StartOffset = parseInt(inputs.duoPhase2StartDay) || 5;

                    const p2Med = inputs.duoPhase2Gonadotropin === 'Same as Phase 1' || !inputs.duoPhase2Gonadotropin
                        ? (gMed || '')
                        : inputs.duoPhase2Gonadotropin;
                    const p2Dose = inputs.duoPhase2Dose || gDose || '';
                    const p2Unit = (p2Med === 'Elonva' || p2Med === 'Rekovelle') ? 'mcg' : 'IU';

                    let p2Sc = '';
                    if (p2Med && p2Med !== 'Elonva') {
                        p2Sc = language === 'th'
                            ? '\nฉีดใต้ผิวหนัง\nDAILY เวลาเดิมทุกวัน'
                            : '\nSubcutaneous injection\nDAILY Fixed time';
                    }

                    const p2Visits = [
                        { id: 'duo-p2-v1', day: 1, label: language === 'th' ? 'OPU Phase 1' : 'Phase 1 OPU', details: [language === 'th' ? 'จุดเริ่มต้น Phase 2' : 'Phase 2 Start Reference'] },
                        { id: 'duo-p2-v2', day: p2StartOffset, label: `${t.visit} 1 (P2)`, details: [t.tvs, t.bloodTest, t.hormoneInjection, language === 'th' ? 'เริ่ม Luteal Phase Stimulation' : 'Start Luteal Phase Stimulation'] },
                        { id: 'duo-p2-v3', day: p2StartOffset + 6, label: `${t.visit} 2 (P2)`, details: [t.tvs, t.continueHormoneInjection] },
                        { id: 'duo-p2-v4', day: p2StartOffset + 9, label: `${t.visit} 3 (P2)`, details: [t.tvs, t.scheduleTriggerShotOnly, t.scheduleOPUDate] },
                        { id: 'duo-p2-v5', day: p2StartOffset + 11, label: `${t.visit} 4 (P2) ${t.lab}`, details: [t.eggCollection, t.semenCollection, t.icsi] },
                    ];

                    const p2MedBars = [];
                    if (p2Med) {
                        p2MedBars.push({
                            id: 'duo-p2-m-gnd',
                            shortName: 'Gonadotropins',
                            startDay: p2StartOffset,
                            endDay: p2StartOffset + 9,
                            label: `${p2Med}\n${p2Dose} ${p2Unit}${p2Sc}`.trim(),
                            color: '#d1fae5',
                            textColor: '#065f46',
                        });
                    }

                    // Antagonist for phase 2
                    if (inputs.antagonistMedication) {
                        let antLabel = inputs.antagonistMedication;
                        if (inputs.antagonistMedication.includes('Orgalutran')) {
                            antLabel = language === 'th'
                                ? "Orgalutran\n0.25 mg\n1 เข็ม ฉีดใต้ผิวหนัง\nวันละ 1 ครั้ง เวลาเดิมทุกวัน"
                                : "Orgalutran\n0.25 mg\n1 syringe Subcutaneous injection\nOnce daily Fixed time";
                        } else if (inputs.antagonistMedication.includes('Cetrotide')) {
                            antLabel = language === 'th'
                                ? "Cetrotide\n0.25 mg\n1 เข็ม ฉีดใต้ผิวหนัง\nวันละ 1 ครั้ง เวลาเดิมทุกวัน"
                                : "Cetrotide\n0.25 mg\n1 syringe Subcutaneous injection\nOnce daily Fixed time";
                        }
                        p2MedBars.push({
                            id: 'duo-p2-m-ant',
                            shortName: 'Antagonist',
                            startDay: p2StartOffset + 4,
                            endDay: p2StartOffset + 9,
                            label: antLabel,
                            color: '#fee2e2',
                            textColor: '#991b1b',
                        });

                    if (inputs.duoPhase2Progesterone && inputs.duoPhase2Progesterone !== 'None') {
                        p2MedBars.push({
                            id: 'duo-p2-m-prog',
                            shortName: 'Progesterone',
                            startDay: p2StartOffset,
                            endDay: p2StartOffset + 9,
                            label: inputs.duoPhase2Progesterone,
                            color: '#f3e8ff',
                            textColor: '#6b21a8',
                        });

                    // Phase 2 trigger
                    const p2TriggerMed = inputs.duoPhase2Trigger === 'Same as Phase 1' || !inputs.duoPhase2Trigger
                        ? inputs.triggerMedication
                        : inputs.duoPhase2Trigger;
                    if (p2TriggerMed) {
                        const v3 = p2Visits.find((v) => v.id === 'duo-p2-v4');
                        if (v3) {
                            v3.details = v3.details.filter((d) => d !== t.scheduleTriggerShotOnly);
                            v3.details.push(`Trigger: ${p2TriggerMed}`);
                            v3.details.push(`${t.triggerTime}: __________`);
                        }
                        p2MedBars.push({
                            id: 'duo-p2-m-trigger',
                            shortName: 'Trigger',
                            startDay: p2StartOffset + 9,
                            endDay: p2StartOffset + 9,
                            label: p2TriggerMed,
                            color: '#009473',
                            textColor: '#ffffff',
                        });
                    }

                    phase2 = {
                        title: `${t.opuTimeline} - DuoStim Phase 2 (Luteal)`,
                        visits: p2Visits,
                        medicationBars: p2MedBars,
                        footerNote: 'Freeze-all: All embryos from both phases will be cryopreserved.'
                    };
                }
                if (inputs.planForEmbryoTransfer) {
                    const isDay3 = inputs.freshTransferDay === '3';
                    const etDay = isDay3 ? 17 : 19;
                    const pregDay = isDay3 ? 27 : 26;

                    visits.push({
                        id: 'opu-v-et',
                        day: etDay,
                        label: language === 'th' ? 'ย้ายตัวอ่อน' : 'Embryo Transfer',
                        details: [t.embryoTransfer || 'Embryo Transfer']
                    });
                    visits.push({
                        id: 'opu-v-preg',
                        day: pregDay,
                        label: language === 'th' ? 'ตรวจการตั้งครรภ์' : 'Pregnancy Test',
                        details: [t.pregnancyTest || 'Pregnancy Test']
                    });

                    medicationBars.push({
                        id: 'opu-m-fresh-duphaston',
                        shortName: 'Duphaston',
                        startDay: 15,
                        endDay: pregDay,
                        label: `${t.duphaston}\n${t.duphastonDose}`,
                        color: '#f3e8ff',
                        textColor: '#6b21a8'
                    });
                    medicationBars.push({
                        id: 'opu-m-fresh-utrogestan',
                        shortName: 'Utrogestran',
                        startDay: 15,
                        endDay: pregDay,
                        label: `${t.utrogestan}\n${t.utrogestanDose}`,
                        color: '#e0e7ff',
                        textColor: '#3730a3'
                    });
                    medicationBars.push({
                        id: 'opu-m-fresh-aspirin',
                        shortName: 'Aspirin',
                        startDay: 15,
                        endDay: pregDay,
                        label: `${t.aspirin}\n${t.aspirinDose}`,
                        color: '#dcfce7',
                        textColor: '#166534'
                    });
                }
                const opuTitle = inputs.protocol === 'Luteal stimulation' ? `${t.opuTimeline} - Luteal Phase Stimulation`
                    : inputs.protocol === 'DuoStim' ? `${t.opuTimeline} - DuoStim Phase 1 (Follicular)`
                    : t.opuTimeline;
                return { title: opuTitle, visits, medicationBars, footerNote: '', phase2 };
            }
            if (type === 'fet') {
                const lmpDate = patientData.lmp ? new Date(patientData.lmp) : new Date();
                lmpDate.setHours(12, 0, 0, 0);

                let defaultProgStartDay = clampInt(inputs.progesteroneStartDay, 15);
                const defaultProgStart = toISODate(addDays(lmpDate, defaultProgStartDay - 1));
                const defaultProgStartTime = '08:00';

                const receptivityHours = parseFloat(inputs.eraOraHours !== undefined ? inputs.eraOraHours : '120');
                const defaultEt = toISODate(addDays(new Date(`${defaultProgStart}T${defaultProgStartTime}`), Math.round(receptivityHours / 24)));
                const defaultEtTime = '10:00';

                const progDateStr = inputs.progStartDate || defaultProgStart;
                const progTimeStr = inputs.progStartTime || defaultProgStartTime;
                const etDateStr = inputs.expectedEtDate || defaultEt;
                const etTimeStr = inputs.expectedEtTime || defaultEtTime;

                let progStartDateTime = new Date(`${progDateStr}T${progTimeStr}`);
                let etDateTime = new Date(`${etDateStr}T${etTimeStr}`);

                const diffMs = progStartDateTime.getTime() - lmpDate.getTime();
                let progStart = Math.round(diffMs / (24 * 3600000)) + 1;

                const etDiffMs = etDateTime.getTime() - lmpDate.getTime();
                let etDay = Math.round(etDiffMs / (24 * 3600000)) + 1;

                progStart = Math.max(1, progStart);
                etDay = Math.max(1, etDay);
                let pregDay = etDay + 7;

                const detailsV4 = [t.tvs, t.startProgesterone, t.scheduleEt];
                const detailsV6 = [t.embryoTransfer];

                if (progStartDateTime && etDateTime) {
                    detailsV4[1] = `${t.startProgesterone} (${formatDateTime(progStartDateTime)})`;
                    detailsV6[0] = `${t.embryoTransfer} (${formatDateTime(etDateTime)})`;
                }

                const visits = [
                    { id: 'fet-v1', day: 1, label: t.menses, details: [] },
                    { id: 'fet-v2', day: 3, label: `${t.visit} 1`, details: [t.tvs, t.hormonePreparation] },
                    { id: 'fet-v3', day: 11, label: `${t.visit} 2`, details: [t.tvs] },
                    { id: 'fet-v4', day: progStart, label: `${t.visit} 3`, details: detailsV4 },
                    { id: 'fet-v5', day: etDay - 1, label: `${t.visit} 4`, details: [t.serumProg] },
                    { id: 'fet-v6', day: etDay, label: `${t.visit} 5`, details: detailsV6 },
                    { id: 'fet-v7', day: pregDay, label: `${t.visit} 6`, details: [t.pregnancyTest] },
                ];
                const medicationBars = [
                    { id: 'fet-m1', shortName: 'Progynova', startDay: 3, endDay: pregDay, label: `${t.progynova}\n${t.progynovaDose}`, color: '#fce7f3', textColor: '#9d174d' },
                    { id: 'fet-m2', shortName: 'Estrodose', startDay: 11, endDay: pregDay, label: `${t.estrodose}\n${t.estrodoseDoseFull}`, color: '#fef9c3', textColor: '#854d0e' },
                    { id: 'fet-m3', shortName: 'Duphaston', startDay: progStart, endDay: pregDay, label: `${t.duphaston}\n${t.duphastonDose}`, color: '#f3e8ff', textColor: '#6b21a8' },
                    { id: 'fet-m4', shortName: 'Utrogestran', startDay: progStart, endDay: pregDay, label: `${t.utrogestan}\n${t.utrogestanDose}`, color: '#e0e7ff', textColor: '#3730a3' },
                    { id: 'fet-m5', shortName: 'Aspirin', startDay: progStart, endDay: pregDay, label: `${t.aspirin}\n${t.aspirinDose}`, color: '#dcfce7', textColor: '#166534' },
                ];
                return { title: t.fetTimeline, visits, medicationBars, footerNote: '' };
            }
            if (type === 'ora') {
                const visits = [
                    { id: 'ora-v1', day: 1, label: t.menses, details: [] },
                    { id: 'ora-v2', day: 3, label: `${t.visit} 1`, details: [t.tvs, t.hormonePreparation] },
                    { id: 'ora-v3', day: 11, label: `${t.visit} 2`, details: [t.tvs] },
                    { id: 'ora-v4', day: 14, label: `${t.visit} 3`, details: [t.tvs, t.oraBloodTest, t.startProgesterone] },
                    { id: 'ora-v5', day: 20, label: `${t.visit} 4`, details: [t.oraBloodDrawing] },
                ];
                const medicationBars = [
                    { id: 'ora-m1', shortName: 'Progynova', startDay: 3, endDay: 20, label: `${t.progynova}\n${t.progynovaDose}`, color: '#fce7f3', textColor: '#9d174d' },
                    { id: 'ora-m2', shortName: 'Estrodose', startDay: 11, endDay: 20, label: `${t.estrodose}\n${t.estrodoseDoseFull}`, color: '#fef9c3', textColor: '#854d0e' },
                    { id: 'ora-m3', shortName: 'Duphaston', startDay: 14, endDay: 20, label: `${t.duphaston}\n${t.duphastonDose}`, color: '#f3e8ff', textColor: '#6b21a8' },
                    { id: 'ora-m4', shortName: 'Utrogestran', startDay: 14, endDay: 20, label: `${t.utrogestan}\n${t.utrogestanDose}`, color: '#e0e7ff', textColor: '#3730a3' },
                ];
                return { title: t.oraTimeline, visits, medicationBars, footerNote: t.oraResultsNote };
            }
            if (type === 'iui') {
                const cLen = clampInt(patientData.cycleLength, 28);
                // Ovulation is predicted at cycleLength - 14 days (Naegele's rule).
                // Visit 2: Follicle monitoring + trigger shot (day before ovulation = cLen - 14)
                // Visit 3: IUI procedure (day after trigger = cLen - 13)
                // Visit 4: Pregnancy test (14 days after IUI = cLen - 13 + 14 = cLen + 1)
                const triggerDay = Math.max(10, cLen - 14);
                const iuiDay = triggerDay + 1;
                const pregnancyTestDay = iuiDay + 14;

                const medName = inputs.iuiMedication || '';
                const medDose = inputs.iuiDose || '';

                // Medicine start day formula: (cycleLength / 2) - 10
                // If cycle length > 30 days, cap at day 5
                const calcStart = cLen > 30 ? 5 : Math.floor(cLen / 2) - 10;
                const iuiStart = inputs.iuiMedStartDay ? parseInt(inputs.iuiMedStartDay) : Math.max(2, calcStart);

                // Clomiphene/Letrozole: 5 days (iuiStart → iuiStart+4)
                // 1 day gap (iuiStart+5)
                // Estrodose starts the day after the gap (iuiStart+6) through end of timeline
                const estrodoseStart = iuiStart + 6;

                const visits = [
                    { id: 'iui-v1', day: 1, label: t.menses, details: [] },
                    { id: 'iui-v2', day: iuiStart, label: `${t.visit} 1`, details: [t.tvs, t.initiateMedication, 'AFC Rt ovary ____ Lt ovary ____'] },
                    { id: 'iui-v3', day: triggerDay, label: `${t.visit} 2`, details: [t.tvs, t.scheduleTriggerShot, 'ET ___ mm Rt ovary ____ Lt ovary ____'] },
                    { id: 'iui-v4', day: iuiDay, label: `${t.visit} 3`, details: [t.semenCollection, t.iui] },
                    { id: 'iui-v5', day: pregnancyTestDay, label: `${t.visit} 4`, details: [t.pregnancyTest] },
                ];
                const medicationBars = [
                    { id: 'iui-m1', shortName: 'IUI Med', startDay: iuiStart, endDay: iuiStart + 4, label: `${medName}\n${medDose}`, color: '#fce7f3', textColor: '#9d174d' },
                    { id: 'iui-m2', shortName: 'Estrodose', startDay: estrodoseStart, endDay: pregnancyTestDay, label: `${t.estrodose}\n${t.estrodoseDoseInstruction}`, color: '#f3e8ff', textColor: '#6b21a8' },
                ];
                return { title: t.iuiTimeline, visits, medicationBars, footerNote: '' };
            }
            return { title: '', visits: [], medicationBars: [], footerNote: '' };
        }

        ReactDOM.render(<ErrorBoundary><App /></ErrorBoundary>, document.getElementById('root'));
    </script>
</body>
