    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useContext, createContext } = React;

        const safeGetItem = (key) => {
            try {
                return localStorage.getItem(key);
            } catch (e) {
                console.warn('localStorage access denied', e);
                return null;
            }
        };

        const safeSetItem = (key, value) => {
            try {
                localStorage.setItem(key, value);
            } catch (e) {
                console.warn('localStorage write denied', e);
            }
        };

        // Error Boundary to catch and display runtime errors
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null, errorInfo: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, errorInfo) {
                this.setState({ errorInfo });
                console.error('ErrorBoundary caught:', error, errorInfo);
                alert('ERROR: ' + error.toString() + '\n\nComponent: ' + (errorInfo && errorInfo.componentStack ? errorInfo.componentStack.split('\n').slice(0,3).join('\n') : ''));
            }
            render() {
                if (this.state.hasError) {
                    return React.createElement('div', { style: { padding: '40px', fontFamily: 'monospace', background: '#fee2e2', margin: '20px', borderRadius: '12px' } },
                        React.createElement('h2', { style: { color: '#991b1b' } }, 'Something went wrong'),
                        React.createElement('pre', { style: { whiteSpace: 'pre-wrap', color: '#7f1d1d', fontSize: '14px' } },
                            this.state.error && this.state.error.toString()),
                        React.createElement('pre', { style: { whiteSpace: 'pre-wrap', color: '#991b1b', fontSize: '12px', marginTop: '10px' } },
                            this.state.errorInfo && this.state.errorInfo.componentStack)
                    );
                }
                return this.props.children;
            }
        }

        // ==========================================
        // PART 1: HELPERS
        // ==========================================
        const addDays = (date, days) => {
            const d = new Date(date);
            d.setHours(12, 0, 0, 0);
            d.setDate(d.getDate() + days);
            return d;
        };
        const formatDate = (date) => {
            if (!date) return '';
            const d = new Date(date);
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const year = d.getFullYear();
            return `${day}/${month}/${year}`;
        };
        const formatDateTime = (date) => {
            if (!date) return '';
            const d = new Date(date);
            if (isNaN(d.getTime())) return '';
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const year = d.getFullYear();
            const hours = String(d.getHours()).padStart(2, '0');
            const minutes = String(d.getMinutes()).padStart(2, '0');
            return `${day}/${month}/${year} ${hours}:${minutes}`;
        };
        const toISODate = (date) => {
            if (!date) return '';
            const d = new Date(date);
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        };
        const parseSafeDateTime = (dateStr, timeStr, fallbackDate = new Date()) => {
            if (!dateStr) return fallbackDate;
            const dParts = dateStr.split('-');
            if (dParts.length !== 3) return fallbackDate;
            const tParts = (timeStr || '00:00').split(':');
            const year = parseInt(dParts[0], 10);
            const month = parseInt(dParts[1], 10) - 1;
            const day = parseInt(dParts[2], 10);
            const hours = parseInt(tParts[0] || 0, 10);
            const minutes = parseInt(tParts[1] || 0, 10);
            const d = new Date(year, month, day, hours, minutes, 0, 0);
            return isNaN(d.getTime()) ? fallbackDate : d;
        };
        const dayFromISO = (iso, lmpDate) => {
            if (!iso) return null;
            const d = new Date(iso);
            d.setHours(12, 0, 0, 0);
            const l = new Date(lmpDate);
            l.setHours(12, 0, 0, 0);
            const diff = Math.round((d - l) / (1000 * 60 * 60 * 24));
            return diff + 1; // Day 1 = LMP
        };
        const clampInt = (v, fallback) => {
            const n = parseInt(v, 10);
            return Number.isFinite(n) ? n : fallback;
        };

            const [patientData, setPatientData] = useState({
                name: '',
                lastName: '',
                hn: '',
                lmp: '',
                pmp: '',
                cycleLength: '',
            });
            const [timelineInputs, setTimelineInputs] = useState({
                visit1Date: toISODate(new Date())
            });
            const [edits, setEdits] = useState({});
            const [savedCases, setSavedCases] = useState([]);
            const [toast, setToast] = useState(null); // { message, type: 'success'|'error' }

            const showToast = (message, type = 'success') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 4000);
            };

            const loadSavedCases = async () => {
                try {
                    const res = await fetch('http://localhost:8012/api/list');
                    if (res.ok) {
                        const files = await res.json();
                        setSavedCases(files);
                        safeSetItem('timeline_saved_cases', JSON.stringify(files));
                        return;
                    }
                } catch (e) {
                    console.log('Local server not running, falling back to localStorage');
                }
                const stored = safeGetItem('timeline_saved_cases');
                if (stored) {
                    try {
                        setSavedCases(JSON.parse(stored));
                    } catch (e) {
                        console.error('Failed to parse saved cases', e);
                    }
                }
            };

            // Load saved cases from localStorage on mount
            useEffect(() => {
                loadSavedCases();
            }, []);

            const handleSaveFile = async () => {
                const now = new Date();
                const newCaseId = Date.now();
                const data = {
                    id: newCaseId,
                    version: 1,
                    timestamp: now.toISOString(),
                    patientData,
                    timelineInputs,
                    currentView,
                    edits
                };

                // Save to Local Storage first
                const newSavedCases = [
                    {
                        id: newCaseId,
                        timestamp: now.toISOString(),
                        patientData: { ...patientData },
                        timelineInputs: { ...timelineInputs },
                        edits: { ...edits },
                        currentView: currentView
                    },
                    ...savedCases.filter(c =>
                        !(c.patientData.hn === patientData.hn &&
                            c.patientData.name === patientData.name &&
                            c.currentView === currentView)
                    ).slice(0, 49) // Keep last 50 cases
                ];
                setSavedCases(newSavedCases);
                safeSetItem('timeline_saved_cases', JSON.stringify(newSavedCases));

                const json = JSON.stringify(data, null, 2);

                // Filename Generation: 'HN First Lastname TYPE'
                const hn = (patientData.hn || '').trim();
                const fname = (patientData.name || '').trim();
                const lname = (patientData.lastName || '').trim();

                // Extract type from currentView (e.g., opuInput -> OPU)
                let typeStr = currentView.replace('Input', '').replace('Output', '');
                if (typeStr === 'mainMenu') typeStr = 'Project';
                typeStr = typeStr.toUpperCase();
                let typeOfCycle = typeStr;
                if (['OPU', 'FET', 'ORA', 'IUI'].includes(typeStr)) {
                    typeOfCycle = `${typeStr} CYCLE`;
                }

                const parts = [hn, fname, lname, typeOfCycle].filter(Boolean);
                let filename = parts.join(' ');
                if (!filename) filename = 'timeline-project';

                try {
                    const res = await fetch('http://localhost:8012/api/save', {
                        method: 'POST',
                        body: JSON.stringify({ type: 'json', filename: filename, content: data }),
                        headers: { 'Content-Type': 'application/json' }
                    });
                    const result = await res.json().catch(() => ({}));
                    const savedPath = result.path || `Timeline-Generator-Output/${filename}.json`;
                    showToast(`${t.saveSuccess}\n📁 ${savedPath}`, 'success');
                } catch (e) {
                    console.log('Local server not running, falling back to manual download', e);
                    const blob = new Blob([json], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `${filename}.json`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                    showToast(`${t.saveSuccess}\n📥 ${t.saveDownloaded}: ${filename}.json`);
                }
            };

            const handleLoadCase = (item) => {
                if (item.patientData) setPatientData(item.patientData);
                if (item.timelineInputs) setTimelineInputs(item.timelineInputs);
                if (item.currentView) setCurrentView(item.currentView);
                if (item.edits) setEdits(item.edits);
                setErrorMessage('');
            };

            const handleDeleteCase = async (id) => {
                try {
                    await fetch('http://localhost:8012/api/save', {
                        method: 'POST',
                        body: JSON.stringify({ type: 'delete', id }),
                        headers: { 'Content-Type': 'application/json' }
                    });
                } catch (e) {
                    console.log('Failed to delete on server', e);
                }
                const next = savedCases.filter(c => c.id !== id);
                setSavedCases(next);
                safeSetItem('timeline_saved_cases', JSON.stringify(next));
            };

            const handleLoadFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (data.patientData) setPatientData(data.patientData);
                        if (data.timelineInputs) setTimelineInputs(data.timelineInputs);
                        if (data.currentView) setCurrentView(data.currentView);
                        if (data.edits) setEdits(data.edits);

                        // Also add it to the local savedCases list if it's a valid data object
                        if (data.patientData) {
                            setSavedCases(prev => {
                                const newCase = {
                                    id: Date.now(),
                                    timestamp: data.timestamp || new Date().toISOString(),
                                    patientData: { ...data.patientData },
                                    timelineInputs: { ...data.timelineInputs },
                                    edits: { ...data.edits },
                                    currentView: data.currentView
                                };
                                const updatedList = [
                                    newCase,
                                    ...prev.filter(c =>
                                        !(c.patientData.hn === data.patientData.hn &&
                                            c.patientData.name === data.patientData.name &&
                                            c.currentView === data.currentView)
                                    ).slice(0, 49)
                                ];
                                safeSetItem('timeline_saved_cases', JSON.stringify(updatedList));
                                return updatedList;
                            });
                        }

                        setErrorMessage('');
                    } catch (err) {
                        console.error(err);
                        setErrorMessage(t.loadError);
                    }
                };
                reader.readAsText(file);
                e.target.value = '';
            };

            useEffect(() => {
                if (patientData.lmp && patientData.pmp) {
                    const l = new Date(patientData.lmp);
                    l.setHours(12, 0, 0, 0);
                    const p = new Date(patientData.pmp);
                    p.setHours(12, 0, 0, 0);
                    if (l > p) {
                        const diff = Math.round((l - p) / (1000 * 60 * 60 * 24));
                        setPatientData((prev) => ({ ...prev, cycleLength: String(diff) }));
                        setErrorMessage('');
                    } else {
                        setPatientData((prev) => ({ ...prev, cycleLength: '' }));
                        setErrorMessage(t.errorLMPBeforePMP);
                    }
                }
            }, [patientData.lmp, patientData.pmp, t.errorLMPBeforePMP]);

            // IUI: Auto-calculate medication start day from cycle length.
            // Letrozole/Clomid typically starts on cycle day 3–5.
            // Formula: max(3, min(5, floor(cycleLength/2) - 10))
            useEffect(() => {
                if (currentView.startsWith('iui') && patientData.cycleLength) {
                    const c = parseInt(patientData.cycleLength, 10);
                    if (!isNaN(c)) {
                        let day = Math.floor(c / 2) - 10;
                        // Clamp to cycle day 3–5 (standard Letrozole/Clomid window)
                        if (day < 3) day = 3;
                        if (day > 5) day = 5;
                        setTimelineInputs(prev => {
                            if (prev.iuiMedStartDay === String(day)) return prev;
                            return { ...prev, iuiMedStartDay: String(day) };
                        });
                    }
                }
            }, [patientData.cycleLength, currentView]);

            // Default progesterone start day for FET
            useEffect(() => {
                if (currentView.startsWith('fet') && !timelineInputs.progesteroneStartDay) {
                    setTimelineInputs(prev => ({ ...prev, progesteroneStartDay: '15' }));
                }
            }, [currentView, timelineInputs.progesteroneStartDay]);

            const onPatientChange = (e) => {
                const { name, value } = e.target;
                let next = { ...patientData, [name]: value };
                if (name === 'lmp' && value) {
                    const l = new Date(value);
                    const p = new Date(l);
                    p.setDate(l.getDate() - 28);
                    next.pmp = toISODate(p);

                    // Update default visit1Date to LMP + 2 days (Day 3)
                    const v1 = new Date(l);
                    v1.setDate(l.getDate() + 2);
                    setTimelineInputs(prev => ({ ...prev, visit1Date: toISODate(v1) }));
                } else if (name === 'cycleLength' && value && next.lmp) {
                    // Requirement: If cycle length changes, PMP should change automatically.
                    // PMP = LMP - CycleLength
                    const days = parseInt(value, 10);
                    if (!isNaN(days) && days > 0) {
                        const l = new Date(next.lmp);
                        const p = new Date(l);
                        p.setDate(l.getDate() - days);
                        next.pmp = toISODate(p);
                    }
                }
                setPatientData(next);
            };

            const setBool = (name, val) =>
                setTimelineInputs((prev) => ({ ...prev, [name]: val }));

            const onTimelineInputChange = (e) => {
                const { name, value } = e.target;
                if (name === 'protocol') {
                    const next = {
                        ...timelineInputs,
                        protocol: value,
                        antagonistMedication: '',
                        antagonistStartDayType: 'cycleDay',
                        antagonistStartDay: '6',
                        progestinMedication: '',
                        progestinStartDayType: 'cycleDay',
                        progestinStartDay: '2',
                        preventionMedication: '',
                        preventionStartDayType: 'cycleDay',
                        preventionStartDay: '6',
                        lutealLhStrategy: 'antagonist',
                        lutealProgestinMedication: '',
                        day1Reference: 'menses',
                    };
                    setTimelineInputs(next);
                    return;
                }
                setTimelineInputs((prev) => ({ ...prev, [name]: value }));
            };

            const resetAll = useCallback(() => {
                setPatientData({
                    name: '',
                    lastName: '',
                    hn: '',
                    lmp: '',
                    pmp: '',
                    cycleLength: '',
                });
                setTimelineInputs({
                    visit1Date: toISODate(new Date())
                });
                setEdits({});
                setErrorMessage('');
                setCurrentView('mainMenu');
            }, []);

            const validateAndGo = (type) => {
                if (!patientData.lmp) {
                    setErrorMessage(t.errorLMP);
                    return;
                }
                if (patientData.pmp) {
                    const l = new Date(patientData.lmp);
                    const p = new Date(patientData.pmp);
                    if (l <= p) {
                        setErrorMessage(t.errorLMPBeforePMP);
                        return;
                    }
                }
                if (type === 'opu') {
                    if (!timelineInputs.protocol || !timelineInputs.gonadotropinMedication) {
                        setErrorMessage(t.errorInput);
                        return;
                    }
                    if (timelineInputs.gonadotropinMedication === 'Elonva') {
                        if (!timelineInputs.gonadotropinDose) {
                            setErrorMessage(t.errorInput);
                            return;
                        }
                        const proj = clampInt(timelineInputs.projectedStimulationDays, 0);
                        if (proj > 7) {
                            if (!timelineInputs.postElonvaGonadotropinMedication || !timelineInputs.postElonvaDose) {
                                setErrorMessage(t.errorInput);
                                return;
                            }
                        }
                    } else {
                        if (!timelineInputs.gonadotropinDose) {
                            setErrorMessage(t.errorInput);
                            return;
                        }
                    }
                }
                if (type === 'iui') {
                    if (!timelineInputs.iuiMedication || !timelineInputs.iuiDose) {
                        setErrorMessage(t.errorInput);
                        return;
                    }
                    if (!patientData.cycleLength && !patientData.pmp) {
                        setErrorMessage(t.errorMissingCycleLengthIUI);
                        return;
                    }
                    const c = clampInt(patientData.cycleLength, 0);
                    if (patientData.cycleLength && c <= 16) {
                        setErrorMessage(t.errorCycleLengthIUI);
                        return;
                    }
                }
                setErrorMessage('');
                setCurrentView(`${type}Output`);
            };

            const renderContent = () => {
                if (currentView === 'mainMenu')
                    return (
                        <MainMenu
                            savedCases={savedCases}
                            onPick={(type) => {
                                setErrorMessage('');
                                setCurrentView(`${type}Input`);
                            }}
                            onLoad={handleLoadFile}
                            onLoadCase={handleLoadCase}
                            onDeleteCase={handleDeleteCase}
                            onRefresh={loadSavedCases}
                        />
                    );
                if (currentView.endsWith('Input')) {
                    const type = currentView.replace('Input', '');
                    return (
                        <InputForm
                            type={type}
                            patientData={patientData}
                            onPatientChange={onPatientChange}
                            inputs={timelineInputs}
                            onInputChange={onTimelineInputChange}
                            setBool={setBool}
                            errorMessage={errorMessage}
                            onBackToMenu={() => setCurrentView('mainMenu')}
                            onReset={resetAll}
                            onGo={() => validateAndGo(type)}
                            onSave={handleSaveFile}
                        />
                    );
                }
                if (currentView.endsWith('Output')) {
                    const type = currentView.replace('Output', '');
                    return (
                        <TimelineDisplay
                            type={type}
                            patientData={patientData}
                            inputs={timelineInputs}
                            setTimelineInputs={setTimelineInputs}
                            edits={edits}
                            setEdits={setEdits}
                            onBack={() => setCurrentView(`${type}Input`)}
                            onSave={handleSaveFile}
                            onReset={resetAll}
                            onBackToMenu={() => setCurrentView('mainMenu')}
                        />
                    );
                }
                return null;
            };

            return (
                <LanguageContext.Provider value={{ language, setLanguage, t }}>
                    <div className="no-print min-h-screen bg-gradient-to-br from-pink-50 via-purple-50 to-indigo-100 text-gray-800 flex flex-col items-center py-8 px-4">
                        <header className="w-full max-w-5xl flex justify-between items-center mb-6">
                            <h1
                                className="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-pink-500 font-heading"
                            >
                                {t.appName}
                            </h1>
                            <LanguageSwitcher />
                        </header>
                        <main className="w-full max-w-5xl bg-white p-6 rounded-xl shadow-lg">
                            {renderContent()}
                        </main>
                        {toast && (
                            <div
                                className={`fixed bottom-6 right-6 z-50 max-w-sm px-5 py-4 rounded-xl shadow-2xl text-white text-sm font-medium transition-all duration-300 animate-slide-up ${
                                    toast.type === 'error'
                                        ? 'bg-red-500'
                                        : 'bg-gradient-to-r from-green-500 to-emerald-600'
                                }`}
                                style={{ whiteSpace: 'pre-line' }}
                            >
                                <div className="flex items-start gap-3">
                                    <span className="text-lg">{toast.type === 'error' ? '❌' : '✅'}</span>
                                    <span className="flex-1">{toast.message}</span>
                                    <button
                                        onClick={() => setToast(null)}
                                        className="text-white/70 hover:text-white text-lg leading-none ml-2"
                                    >×</button>
                                </div>
                            </div>
                        )}
                    </div>
                </LanguageContext.Provider>
            );
        }

        function LanguageSwitcher() {
            const { language, setLanguage, t } = useLanguage();
            return (
                <div className="flex items-center space-x-2">
                    <label
                        className="text-sm font-medium text-gray-600"
                        style={{ fontFamily: "'Anuphan'" }}
                    >
                        {t.selectLanguage}
                    </label>
                    <select
                        value={language}
                        onChange={(e) => setLanguage(e.target.value)}
                        className="p-2 border border-gray-300 rounded-md font-sans"
                    >
                        <option value="th">ภาษาไทย</option>
                        <option value="en">English</option>
                    </select>
                </div >
            );
        }

        function MainMenu({ savedCases, onPick, onLoad, onLoadCase, onDeleteCase, onRefresh }) {
            const { t, language } = useLanguage();
            const [sortConfig, setSortConfig] = useState({ key: 'timestamp', direction: 'desc' });
            const [selectedIds, setSelectedIds] = useState(new Set());

            const formatTimestamp = (ts) => {
                if (!ts) return '-';
                const d = new Date(ts);
                const day = String(d.getDate()).padStart(2, '0');
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const year = d.getFullYear();
                const hour = String(d.getHours()).padStart(2, '0');
                const min = String(d.getMinutes()).padStart(2, '0');
                return `${day}/${month}/${year} ${hour}:${min}`;
            };

            const sortedCases = useMemo(() => {
                let sortableSteps = [...savedCases];
                if (sortConfig.key !== null) {
                    sortableSteps.sort((a, b) => {
                        let aVal, bVal;
                        if (sortConfig.key === 'timestamp') {
                            aVal = new Date(a.timestamp).getTime();
                            bVal = new Date(b.timestamp).getTime();
                        } else if (sortConfig.key === 'name') {
                            aVal = (a.patientData.name || '').toLowerCase();
                            bVal = (b.patientData.name || '').toLowerCase();
                        } else if (sortConfig.key === 'lastName') {
                            aVal = (a.patientData.lastName || '').toLowerCase();
                            bVal = (b.patientData.lastName || '').toLowerCase();
                        } else if (sortConfig.key === 'hn') {
                            aVal = (a.patientData.hn || '').toLowerCase();
                            bVal = (b.patientData.hn || '').toLowerCase();
                        }

                        if (aVal < bVal) {
                            return sortConfig.direction === 'asc' ? -1 : 1;
                        }
                        if (aVal > bVal) {
                            return sortConfig.direction === 'asc' ? 1 : -1;
                        }
                        return 0;
                    });
                }
                return sortableSteps;
            }, [savedCases, sortConfig]);

            const requestSort = (key) => {
                let direction = 'asc';
                if (sortConfig.key === key && sortConfig.direction === 'asc') {
                    direction = 'desc';
                }
                setSortConfig({ key, direction });
            };

            const toggleSelect = (id) => {
                const next = new Set(selectedIds);
                if (next.has(id)) next.delete(id);
                else next.add(id);
                setSelectedIds(next);
            };

            const toggleSelectAll = () => {
                if (selectedIds.size === savedCases.length) {
                    setSelectedIds(new Set());
                } else {
                    setSelectedIds(new Set(savedCases.map(c => c.id)));
                }
            };

            const handleExport = (ids) => {
                const casesToExport = ids
                    ? savedCases.filter(c => ids.has(c.id))
                    : savedCases;

                if (casesToExport.length === 0) return;

                const data = {
                    version: 1,
                    timestamp: new Date().toISOString(),
                    type: 'bulk_export',
                    count: casesToExport.length,
                    cases: casesToExport
                };

                const json = JSON.stringify(data, null, 2);
                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;

                const now = new Date();
                const dateStr = `${String(now.getDate()).padStart(2, '0')}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getFullYear()).slice(-2)}`;
                link.download = `timeline-export-${dateStr}.json`;

                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            };

            const SortIndicator = ({ column }) => {
                if (sortConfig.key !== column) return <span className="ml-1 opacity-30 text-[10px]">⇅</span>;
                return <span className="ml-1 text-[10px]">{sortConfig.direction === 'asc' ? '▲' : '▼'}</span>;
            };

            const Btn3D = ({ text, onClick, color }) => {
                const colorClasses = {
                    indigo: 'bg-indigo-500 border-indigo-700 hover:bg-indigo-400 active:border-indigo-500',
                    pink: 'bg-pink-500 border-pink-700 hover:bg-pink-400 active:border-pink-500',
                    purple: 'bg-purple-500 border-purple-700 hover:bg-purple-400 active:border-purple-500',
                    blue: 'bg-blue-500 border-blue-700 hover:bg-blue-400 active:border-blue-500',
                };
                const baseClass =
                    'w-full py-8 rounded-xl text-white font-bold text-2xl shadow-xl transition-all transform active:translate-y-2 border-b-[8px] active:border-b-0 font-heading';
                return (
                    <button
                        onClick={onClick}
                        className={`${baseClass} ${colorClasses[color]}`}
                        style={{
                            fontFamily: "'Anuphan'"
                        }}
                    >
                        {text}
                    </button >
                );
            };
            return (
                <div className="flex flex-col items-center w-full">
                    <h2
                        className="text-2xl font-semibold text-gray-700 mb-8 font-heading"
                        style={{ fontFamily: "'Anuphan'" }}
                    >
                        {t.selectTimelineType}
                    </h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-3xl">
                        <Btn3D text={t.opuTimeline} onClick={() => onPick('opu')} color="indigo" />
                        <Btn3D text={t.fetTimeline} onClick={() => onPick('fet')} color="pink" />
                        <Btn3D text={t.oraTimeline} onClick={() => onPick('ora')} color="purple" />
                        <Btn3D text={t.iuiTimeline} onClick={() => onPick('iui')} color="blue" />
                    </div>

                    <div className="mt-12 w-full max-w-5xl">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 border-b pb-4 gap-4">
                            <h3 className="text-xl font-bold text-gray-700 font-heading">
                                {t.savedCases}
                            </h3>
                            <div className="flex flex-wrap gap-2">
                                <button
                                    onClick={() => handleExport()}
                                    className="flex items-center gap-2 px-3 py-1 bg-green-50 hover:bg-green-100 text-green-700 rounded text-sm transition-colors border border-green-200 font-medium"
                                    style={{ fontFamily: "'Anuphan'" }}
                                >
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                                    {t.exportAll}
                                </button>
                                {selectedIds.size > 0 && (
                                    <button
                                        onClick={() => handleExport(selectedIds)}
                                        className="flex items-center gap-2 px-3 py-1 bg-blue-50 hover:bg-blue-100 text-blue-700 rounded text-sm transition-colors border border-blue-200 font-medium animate-in fade-in slide-in-from-right-2"
                                        style={{ fontFamily: "'Anuphan'" }}
                                    >
                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
                                        {t.exportSelected} ({selectedIds.size})
                                    </button>
                                )}
                                <button
                                    onClick={onRefresh}
                                    className="flex items-center gap-2 px-3 py-1 bg-gray-50 hover:bg-gray-100 text-gray-600 rounded text-sm transition-colors border border-gray-200 font-medium"
                                    style={{ fontFamily: "'Anuphan'" }}
                                >
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                                    {t.refresh}
                                </button>
                            </div >
                        </div >
                        {
                            savedCases.length === 0 ? (
                                <p className="text-gray-500 italic py-4">{t.noSavedCases}</p>
                            ) : (
                                <div className="overflow-x-auto bg-white rounded-lg shadow-sm border border-gray-200">

                                            value={inputs.iuiMedStartDay || String(Math.max(2, (() => { const cl = parseInt(patientData.cycleLength || '28'); return cl > 30 ? 5 : Math.floor(cl / 2) - 10; })()))}
                                            onChange={onInputChange}
                                            className="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
                                        />
                                    </div>
                                </div>
                            </div >
                        )
                    }

                    {
                        type === 'fet' && (
                            <div className="bg-gray-50 p-6 rounded-lg border border-gray-200">
                                <h3 className="text-lg font-semibold text-indigo-900 mb-4 font-heading" style={{ fontFamily: "'Anuphan'" }}>
                                    Medication & Visit Links
                                </h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="md:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <RadioBool
                                            label={t.eraOraTestDoneLabel}
                                            name="eraOraTestDone"
                                            value={inputs.eraOraTestDone}
                                            onChange={setBool}
                                            trueLabel={t.yes}
                                            falseLabel={t.no}
                                        />
                                        {inputs.eraOraTestDone ? (
                                            <InputField
                                                label={t.eraOraHoursLabel}
                                                name="eraOraHours"
                                                type="number"
                                                value={inputs.eraOraHours !== undefined ? inputs.eraOraHours : '120'}
                                                onChange={onInputChange}
                                            />
                                        ) : (
                                            <InputField
                                                label={t.progesteroneStartDayLabel}
                                                name="progesteroneStartDay"
                                                type="number"
                                                value={inputs.progesteroneStartDay || '15'}
                                                onChange={onInputChange}
                                            />
                                        )}
                                    </div>
                                    {!inputs.eraOraTestDone && (
                                        <div className="md:col-span-2 flex items-end pb-2 text-sm text-gray-500 italic" style={{ fontFamily: "'Anuphan'" }}>
                                            Visit 4 = Start + 5 days, Visit 5 = Start + 6 days
                                        </div>
                                    )}
                                </div>
                            </div>
                        )
                    }

                    <div className="flex justify-center pt-4">
                        <button
                            onClick={onGo}
                            className="px-8 py-3 bg-indigo-600 text-white font-bold rounded-lg shadow hover:bg-indigo-700 transform hover:scale-105 transition-all"
                            style={{ fontFamily: "'Anuphan'" }}
                        >
                            {t.go}
                        </button>
                    </div >
                </div >
            );
        }

        function TimelineDisplay({ type, patientData, inputs, setTimelineInputs, edits, setEdits, onBack, onSave, onReset, onBackToMenu }) {
            const { t, language } = useLanguage();

            // Responsive scaling of the 794x1123 preview document to always fit within its container at any viewport width
            const previewRef = React.useRef(null);
            const [previewScale, setPreviewScale] = useState(1);
            useEffect(() => {
                const el = previewRef.current;
                if (!el) return;
                const update = () => {
                    const available = el.clientWidth - 32; // subtract p-4 padding (16px each side)
                    const scale = Math.min(1, available / 794);
                    setPreviewScale(scale > 0 ? scale : 1);
                };
                update();
                const observer = new ResizeObserver(update);
                observer.observe(el);
                return () => observer.disconnect();
            }, []);

            const lmpDate = useMemo(() => {
                const d = patientData.lmp ? new Date(patientData.lmp) : new Date();
                d.setHours(12, 0, 0, 0);
                return d;
            }, [patientData.lmp]);

            const handleEtChange = (newDate, newTime) => {
                const defaultProgStartDay = clampInt(inputs.progesteroneStartDay, 15);
                const defaultProgStart = addDays(lmpDate, defaultProgStartDay - 1);
                const receptivityHours = parseFloat(inputs.eraOraHours !== undefined ? inputs.eraOraHours : '120');
                const defaultEt = addDays(defaultProgStart, Math.round(receptivityHours / 24));
                
                const dateStr = newDate !== undefined ? newDate : (inputs.expectedEtDate || toISODate(defaultEt));
                const timeStr = newTime !== undefined ? newTime : (inputs.expectedEtTime || '10:00');
                
                const etDateTime = new Date(`${dateStr}T${timeStr}`);
                const receptivityMs = receptivityHours * 3600000;
                const progStartDateTime = new Date(etDateTime.getTime() - receptivityMs);
                
                setTimelineInputs(prev => ({
                    ...prev,
                    expectedEtDate: dateStr,
                    expectedEtTime: timeStr,
                    progStartDate: toISODate(progStartDateTime),
                    progStartTime: String(progStartDateTime.getHours()).padStart(2, '0') + ':' + String(progStartDateTime.getMinutes()).padStart(2, '0')
                }));
            };

            const handleProgChange = (newDate, newTime) => {
                const defaultProgStartDay = clampInt(inputs.progesteroneStartDay, 15);
                const defaultProgStart = addDays(lmpDate, defaultProgStartDay - 1);
                
                const dateStr = newDate !== undefined ? newDate : (inputs.progStartDate || toISODate(defaultProgStart));
                const timeStr = newTime !== undefined ? newTime : (inputs.progStartTime || '08:00');
                
                const progStartDateTime = new Date(`${dateStr}T${timeStr}`);
                const receptivityHours = parseFloat(inputs.eraOraHours !== undefined ? inputs.eraOraHours : '120');
                const receptivityMs = receptivityHours * 3600000;
                const etDateTime = new Date(progStartDateTime.getTime() + receptivityMs);
                
                setTimelineInputs(prev => ({
                    ...prev,
                    progStartDate: dateStr,
                    progStartTime: timeStr,
                    expectedEtDate: toISODate(etDateTime),
                    expectedEtTime: String(etDateTime.getHours()).padStart(2, '0') + ':' + String(etDateTime.getMinutes()).padStart(2, '0')
                }));
            };

            const handleTriggerChange = (newDate, newTime) => {
                const defaultTriggerDay = 12;
                const defaultTriggerDate = toISODate(addDays(lmpDate, defaultTriggerDay - 1));
                const defaultTriggerTime = '20:00';
                
                const dateStr = newDate !== undefined ? newDate : (inputs.triggerStartDate || defaultTriggerDate);
                const timeStr = newTime !== undefined ? newTime : (inputs.triggerStartTime || defaultTriggerTime);
                
                const triggerDateTime = new Date(`${dateStr}T${timeStr}`);
                const opuDateTime = new Date(triggerDateTime.getTime() + 36 * 3600000); // Trigger + 36 hrs
                
                setTimelineInputs(prev => ({
                    ...prev,
                    triggerStartDate: dateStr,
                    triggerStartTime: timeStr,
                    opuDate: toISODate(opuDateTime),
                    opuTime: String(opuDateTime.getHours()).padStart(2, '0') + ':' + String(opuDateTime.getMinutes()).padStart(2, '0')
                }));
            };

            const handleOpuChange = (newDate, newTime) => {
                const defaultOpuDay = 14;
                const defaultOpuDate = toISODate(addDays(lmpDate, defaultOpuDay - 1));
                const defaultOpuTime = '08:00';
                
                const dateStr = newDate !== undefined ? newDate : (inputs.opuDate || defaultOpuDate);
                const timeStr = newTime !== undefined ? newTime : (inputs.opuTime || defaultOpuTime);
                
                const opuDateTime = new Date(`${dateStr}T${timeStr}`);
                const triggerDateTime = new Date(opuDateTime.getTime() - 36 * 3600000); // OPU - 36 hrs
                
                setTimelineInputs(prev => ({
                    ...prev,
                    opuDate: dateStr,
                    opuTime: timeStr,
                    triggerStartDate: toISODate(triggerDateTime),
                    triggerStartTime: String(triggerDateTime.getHours()).padStart(2, '0') + ':' + String(triggerDateTime.getMinutes()).padStart(2, '0')
                }));
            };

            const base = useMemo(
                () => {
                    try {
                        const result = buildTimelineBase(type, patientData, inputs, t, language);
                        console.log('buildTimelineBase OK:', result.visits.length, 'visits,', result.medicationBars.length, 'meds');
                        return result;
                    } catch(e) {
                        console.error('buildTimelineBase CRASHED:', e);
                        return { title: 'Error', visits: [], medicationBars: [], footerNote: '', phase2: null };
                    }
                },
                [type, patientData, inputs, t, language],
            );

            // Initialize edits with Visit 1 Default Date if provided
            useEffect(() => {
                if (type === 'opu' && inputs.visit1Date) {
                    // For OPU: use the manually entered visit1Date to anchor Visit 1
                    setEdits(prev => ({
                        ...prev,
                        'opu-v2': { ...prev['opu-v2'], dateISO: inputs.visit1Date }
                    }));
                }
            }, [inputs.visit1Date, type, lmpDate]);

            const setEdit = (id, patch) => setEdits((prev) => ({ ...prev, [id]: { ...(prev[id] || {}), ...patch } }));

            const handleFieldClick = (visitId, fieldKey, currentVal, label, suffix) => {
                const newVal = prompt(`${label}:`, currentVal || '');
                if (newVal !== null) {
                    setEdit(visitId, { [fieldKey]: newVal });
                }
            };

            // DuoStim phase toggle
            const [showPhase2, setShowPhase2] = React.useState(false);
            const activeBase = (showPhase2 && base.phase2) ? base.phase2 : base;

            const applied = useMemo(() => {
                const currentVisits = activeBase.visits
                    .map((v) => {
                        const e = edits[v.id];
                        let day = v.day;
                        if (e?.day !== undefined) {
                            day = parseInt(e.day, 10);
                        } else if (e?.dateISO) {
                            day = dayFromISO(e.dateISO, lmpDate) || day;
                        }
                        return { ...v, day: Math.max(1, day) };
                    })
                    .sort((a, b) => a.day - b.day);

                // Sunday Check
                const sundayVisits = currentVisits.filter((v) => {
                    const d = addDays(lmpDate, v.day - 1);
                    return d.getDay() === 0; // 0 is Sunday
                });

                const getDayByVid = (vid) => currentVisits.find((v) => v.id === vid)?.day;
                const medOverrides = {};
                const setStart = (mid, vid) => {
                    const d = getDayByVid(vid);
                    if (d) medOverrides[mid] = { ...(medOverrides[mid] || {}), start: d };
                };
                const setEnd = (mid, vid) => {
                    const d = getDayByVid(vid);
                    if (d) medOverrides[mid] = { ...(medOverrides[mid] || {}), end: d };
                };
                if (type === 'fet') {
                    // For FET cycles, adjust medication start days relative to specific visits and manual inputs.
                    // Progynova starts at Visit 1 (fet-v2), Estrodose at Visit 2 (fet-v3).
                    setStart('fet-m1', 'fet-v2');
                    setStart('fet-m2', 'fet-v3');

                    // Meds from manual input (already set in buildTimelineBase, but ensuring persistence if visits move)
                    const progStart = getDayByVid('fet-v4') + 1; // Default expectation
                    // However, we want them linked to the manual input primarily.
                    // If the user hasn't edited the med specifically, buildTimelineBase already handled it.
                    // We don't force them TO visit 4 anymore as they are "1 day after".

                    // Force all FET medication bars to end at the final visit (fet-v7).
                    activeBase.medicationBars.forEach((m) => setEnd(m.id, 'fet-v7'));
                } else if (type === 'ora') {
                    setStart('ora-m1', 'ora-v2');
                    setStart('ora-m2', 'ora-v3');
                    ['ora-m3', 'ora-m4'].forEach((m) => setStart(m, 'ora-v4'));
                    activeBase.medicationBars.forEach((m) => setEnd(m.id, 'ora-v5'));
                }
                if (type === 'opu') {
                    const isP2 = showPhase2 && base.phase2;
                    const triggerVid = isP2 ? 'duo-p2-v4' : 'opu-v4';
                    const v3Day = getDayByVid(triggerVid);
                    if (v3Day) {
                        // Cap trigger bars at Visit 3 position
                        const triggerMid = isP2 ? 'duo-p2-m-trigger' : 'opu-m-trigger';
                        medOverrides[triggerMid] = { start: v3Day, end: v3Day };
                        medOverrides['opu-m-lut-trigger'] = { start: v3Day, end: v3Day };

                        const medsToCap = isP2
                            ? ['duo-p2-m-gnd', 'duo-p2-m-ant', 'duo-p2-m-prog']
                            : ['opu-m-ant', 'opu-m-ppos'];
                        // Only cap OPU Main Gonadotropin if it is NOT Elonva.
                        // If it is Elonva, it has a fixed duration handled in buildTimelineBase.
                        if (!isP2) {
                            if (inputs.gonadotropinMedication !== 'Elonva') {
                                medsToCap.push('opu-m-gnd');
                            }
                            // Post-Elonva always ends at trigger decision (Visit 3)
                            medsToCap.push('opu-m-post-elonva');
                            // Luteal stimulation medication bars
                            medsToCap.push('opu-m-lut-gnd', 'opu-m-lut-ant', 'opu-m-lut-progestin');
                        }

                        medsToCap.forEach((m) => setEnd(m, triggerVid));
                    }

                    // Explicitly link Post-Elonva start to Elonva end if applicable
                    if (inputs.gonadotropinMedication === 'Elonva') {
                        const gStart = inputs.gonadotropinStartDay ? parseInt(inputs.gonadotropinStartDay) : 3;
                        // Elonva is 7 days: Start, Start+1, ..., Start+6. End Day is Start+6.
                        const elonvaEnd = gStart + 6;

                        // User requested: "start on the same day as Elonva end"
                        medOverrides['opu-m-post-elonva'] = {
                            ...(medOverrides['opu-m-post-elonva'] || {}),
                            start: elonvaEnd
                        };
                    }

                    // End fresh transfer medications at Pregnancy Test visit
                    if (inputs.planForEmbryoTransfer) {
                        setEnd('opu-m-fresh-duphaston', 'opu-v-preg');
                        setEnd('opu-m-fresh-utrogestan', 'opu-v-preg');
                        setEnd('opu-m-fresh-aspirin', 'opu-v-preg');
                    }
                }
                const finalMedicationBars = activeBase.medicationBars.map((m) => {
                    const override = medOverrides[m.id] || {};
                    const edit = edits[m.id] || {};
                    let startDay = override.start !== undefined ? override.start : m.startDay;
                    let endDay = override.end !== undefined ? override.end : m.endDay;
                    if (edit.startISO) {
                        startDay = Math.max(1, dayFromISO(edit.startISO, lmpDate) || startDay);
                    }
                    if (edit.endISO) {
                        endDay = Math.max(startDay, dayFromISO(edit.endISO, lmpDate) || endDay);
                    }
                    const label = edit.labelOverride !== undefined ? edit.labelOverride : m.label;
                    return { ...m, startDay, endDay, label };
                });
                return { ...activeBase, visits: currentVisits, medicationBars: finalMedicationBars, sundayVisits };
            }, [activeBase, edits, lmpDate, type]);

            const headerHeight = 220;
            const footerHeight = 80;
            const tableHeight = type === 'opu' ? 280 : 0;
            const timelineAreaHeight = 1123 - headerHeight - footerHeight - tableHeight;

            // Determine the maximum day based on visits and medications.  
            // Remove the fixed 28-day offset for FET to allow the scale to compress if needed.
            const maxDay = Math.max(
                0,
                ...(applied.visits || []).map((v) => v.day),
                ...(applied.medicationBars || []).map((m) => m.endDay)
            );
            // Default maxDay to at least 14 for OPU to prevent zooming in too much on short cycles
            const calcMaxDay = Math.max(type === 'opu' ? 14 : 0, maxDay);

            const svgWidth = 1024;
            const svgHeight = timelineAreaHeight;
            const contentPaddingTop = 40;
            const contentPaddingBottom = 20;
            const dayUnit = 70;
            const timelineEndOffset = 3;
            // Use calcMaxDay for scale calculation
            const timelineLengthPx = dayUnit * (calcMaxDay + timelineEndOffset);
            const availableH = svgHeight - contentPaddingTop - contentPaddingBottom;
            // Base scale for the timeline.  
            // Allow the scale to go lower (0.3) so that all visits fit within the available space for FET timelines.
            const standardScale = Math.min(1.2, Math.max(0.3, availableH / timelineLengthPx));

            const getYPos = (day, scale) => (day * dayUnit) * scale + contentPaddingTop;
            // Increased timelineX from 100 to 140 to prevent left-side date clipping
            const timelineX = 90;
            const visitAreaWidth = 260;

            const packedVisits = useMemo(() => {
                const items = applied.visits.map((v) => {
                    const lineCount = v.details.length;
                    let extra = 0;
                    // Provide additional height for certain visits based on timeline type.
                    if (v.id === 'fet-v6') {
                        extra = 120;
                    } else if (v.id === 'fet-v7') {
                        extra = 80;
                    } else if (v.id === 'fet-v5') {
                        extra = 50;
                    } else if (['fet-v2', 'fet-v3', 'fet-v4'].includes(v.id)) {
                        extra = 60;
                    } else if (v.id === 'ora-v5') {
                        extra = 50;
                    } else if (['ora-v2', 'ora-v3', 'ora-v4'].includes(v.id)) {
                        extra = 60;
                    }
                    // OPU visits with many details (e.g. Luteal/DuoStim) need extra height
                    if (type === 'opu' && lineCount >= 4) {
                        extra = Math.max(extra, 40);
                    }
                    // DuoStim phase 2 visits
                    if (v.id && v.id.startsWith('duo-p2-')) {
                        extra = Math.max(extra, 40);
                    }
                    return { ...v, h: 30 + lineCount * 26 + extra };
                });
                let scale = standardScale;
                let positions;
                const project = (s) => {
                    let lastBottom = -1000;
                    return items.map((item) => {
                        let y = getYPos(item.day, s);
                        if (y < lastBottom + 20) {
                            y = lastBottom + 20;
                        }
                        lastBottom = y + item.h;
                        return { ...item, _y: y, _bottom: lastBottom };
                    });
                };
                positions = project(scale);
                let lastItem = positions[positions.length - 1];
                let totalUsed = lastItem ? lastItem._bottom : 0;
                const budget = svgHeight - 40;
                // If content overflows the available timeline area, shrink the day-scale
                // progressively until it fits (down to an absolute minimum).
                if (totalUsed > budget && items.length > 1) {
                    let lo = 0.05, hi = scale;
                    for (let i = 0; i < 14; i++) {
                        const mid = (lo + hi) / 2;
                        const probe = project(mid);
                        const probeEnd = probe[probe.length - 1]._bottom;
                        if (probeEnd > budget) hi = mid; else lo = mid;
                    }
                    scale = lo;
                    positions = project(scale);
                } else {
                    // Otherwise, use the slack to space visits out more (up to 2.0x).
                    const slack = budget - totalUsed;
                    if (slack > 50) {
                        const newScale = Math.min(2.0, availableH / timelineLengthPx);
                        positions = project(newScale);
                        scale = newScale;
                    }
                }
                return { items: positions, finalScale: scale };
            }, [applied.visits, standardScale, svgHeight, availableH, timelineLengthPx]);

            const { items: visitItems, finalScale } = packedVisits;
            const timelineEndY = Math.max(
                getYPos(maxDay + timelineEndOffset, finalScale),
                visitItems[visitItems.length - 1]?._bottom || 0,
            ) + 20;
            // Use a content-aware SVG height so all visits/bars fit; the SVG element is scaled
            // uniformly to fit the page width so content is never clipped.
            const svgContentHeight = Math.max(svgHeight, timelineEndY + 40);

            const barsStartX = timelineX + 30 + visitAreaWidth;
            const remainingWidthForBars = svgWidth - barsStartX - 40;
            const numberOfStandardBars = applied.medicationBars.filter((m) => !m.id || !m.id.includes('trigger')).length;
            const stdBarWidth =
                numberOfStandardBars > 0 ? remainingWidthForBars / numberOfStandardBars - 10 : 100;

            // Calculate shifts introduced by packing visits. Each visit may have been pushed down relative to
            // its original day position to avoid overlapping text; medication bars must incorporate these shifts
            // so that they end at the same visual level as the final visit.  For each visit, record the
            // difference between the repositioned y-coordinate (_y) and the baseline y based on day and scale.
            const visitShifts = useMemo(() => {
                return visitItems.map((v) => {
                    const originalY = getYPos(v.day, finalScale);
                    const shift = v._y - originalY;
                    return { day: v.day, shift };
                });
            }, [visitItems, finalScale, getYPos]);

            // Adjust a y-position for a given day by accumulating shifts from all visits occurring before that day.
            const adjustY = (day) => {
                // Adjust a y-position for a given day by accumulating shifts from all visits whose
                // day is less than or equal to the target day.  This ensures that medication bars
                // extend all the way to the repositioned final visit.  Previously we only
                // accounted for visits with day < target day, which caused bars to stop
                // early when the last visit was shifted downward.
                let totalShift = 0;
                for (const vs of visitShifts) {
                    // Include shifts for visits on or before the current day (<=) rather than strictly before (<).
                    if (day >= vs.day) {
                        totalShift += vs.shift;
                    }
                }
                return getYPos(day, finalScale) + totalShift;
            };

            const barLayout = useMemo(() => {
                let standardIndex = 0;
                // const colors = ['#d1fae5', '#fce7f3', '#e0e7ff', '#fef9c3', '#fee2e2']; // Original pastels (unused)
                const textColors = ['#065f46', '#9d174d', '#3730A3', '#854d0e', '#ea580c']; // Dark colors for outlines
                const bgColors = ['#dcfce7', '#fce7f3', '#e0e7ff', '#fef9c3', '#ffedd5']; // Tinted backgrounds
                return applied.medicationBars.map((m, i) => {
                    const isTrigger = m.id && m.id.includes('trigger');
                    let x, w, y, h;
                    const startY = adjustY(m.startDay);
                    const endY = adjustY(m.endDay);
                    if (isTrigger) {
                        x = barsStartX;
                        w = remainingWidthForBars;
                        y = startY + 15;
                        h = 75;
                    } else {
                        x = barsStartX + standardIndex * (stdBarWidth + 10);
                        w = stdBarWidth;
                        y = startY;
                        h = Math.max(endY - startY, 40);
                        standardIndex++;
                    }

                    // Design: Outlines in various dark colors (high contrast for B&W printing)
                    let stroke;
                    let tx;
                    let bg;

                    if (isTrigger) {
                        // Trigger: Dark Teal
                        stroke = '#009473';
                        tx = '#009473';
                        bg = '#ccfbf1';
                    } else {
                        // Others: Cycle through dark palette
                        stroke = textColors[i % textColors.length];
                        tx = textColors[i % textColors.length];
                        bg = bgColors[i % bgColors.length];
                    }

                    const dateLabel = formatDate(addDays(lmpDate, m.startDay - 1));
                    return { ...m, x, w, y, h, isTrigger, stroke, tx, bg, dateLabel };
                });
            }, [applied.medicationBars, barsStartX, remainingWidthForBars, stdBarWidth, adjustY, lmpDate]);

            // Helper: render a DOM element to JPEG data URL at 3x resolution
            const renderPageImage = (pageElement) => {
                return new Promise((resolve, reject) => {
                    const node = pageElement.cloneNode(true);
                    node.removeAttribute('id');
                    const isLandscape = pageElement.id === 'print-page1';
                    const wVal = isLandscape ? 1123 : 794;
                    const hVal = isLandscape ? 794 : 1123;
                    Object.assign(node.style, {
                        position: 'fixed', left: '0', top: '0', zIndex: '-9999',
                        display: 'block', visibility: 'visible', transform: 'none',
                        width: wVal + 'px', height: hVal + 'px', overflow: 'hidden'
                    });
                    document.body.appendChild(node);
                    requestAnimationFrame(() => {
                        const sf = 3;
                        domtoimage.toJpeg(node, {
                            quality: 1.0, bgcolor: '#ffffff',
                            width: wVal * sf, height: hVal * sf,
                            style: { transform: `scale(${sf})`, transformOrigin: 'top left' }
                        })
                        .then(url => { document.body.removeChild(node); resolve(url); })
                        .catch(err => { if (document.body.contains(node)) document.body.removeChild(node); reject(err); });
                    });
                });
            };

            const getFilename = () => {
                const hn = (patientData.hn || '').trim();
                const fname = (patientData.name || '').trim();
                const lname = (patientData.lastName || '').trim();
                const typeStr = type.toUpperCase();
                let typeOfCycle = typeStr;
                if (['OPU', 'FET', 'ORA', 'IUI'].includes(typeStr)) {
                    typeOfCycle = `${typeStr} CYCLE`;
                }
                const parts = [hn, fname, lname, typeOfCycle].filter(Boolean);
                return parts.join(' ');
            };

            const handlePrint = () => {
                const filename = getFilename();
                document.fonts.ready.then(async () => {
                    try {
                        const p1 = document.getElementById('print-page1');
                        const p2 = document.getElementById('print-page2');
                        if (!p1) return;
                        const page1Url = await renderPageImage(p1);
                        const pdf = new window.jspdf.jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
                        pdf.addImage(page1Url, 'JPEG', 0, 0, 297, 210);
                        if (p2) {
                            const page2Url = await renderPageImage(p2);
                            pdf.addPage('a4', 'portrait');
                            pdf.addImage(page2Url, 'JPEG', 0, 0, 210, 297);
                        }
                        const pdfUri = pdf.output('datauristring');
                        fetch('http://localhost:8012/api/save', {
                            method: 'POST',
                            body: JSON.stringify({ type: 'pdf', filename, content: pdfUri }),
                            headers: { 'Content-Type': 'application/json' }
                        })
